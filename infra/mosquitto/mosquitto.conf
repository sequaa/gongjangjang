# Skeleton broker config (D-03). Anonymous, unencrypted, docker-network only.
# Auth/TLS are intentionally deferred (Phase 4) — see 01-RESEARCH Security Domain.
listener 1883
allow_anonymous true
persistence false
log_dest stdout
# Pitfall 1 (02-RESEARCH): default 20 caps inflight window, killing batch amortization.
# 0 = unlimited; broker queues all unacked QoS1 msgs so manual-ack batches are not bottlenecked.
max_inflight_messages 0
max_queued_messages 100000
