spring.application.name=backend

# Datasource (overridden by SPRING_DATASOURCE_* env in docker-compose)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sensors}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sensors}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sensors_dev_pw}

# Run the naive schema.sql on startup against the (already-running) Postgres.
spring.sql.init.mode=always

# MQTT broker (overridden by MQTT_BROKER_URL env in docker-compose)
mqtt.broker.url=${MQTT_BROKER_URL:tcp://localhost:1883}
mqtt.client.id=backend-ingest
mqtt.topic=sensors/+
