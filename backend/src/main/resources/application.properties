spring.application.name=backend

# Datasource (overridden by SPRING_DATASOURCE_* env in docker-compose)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sensors?rewriteBatchedStatements=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sensors}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sensors_dev_pw}

# Run the schema scripts on startup against the (already-running) Postgres.
# Setting schema-locations overrides the default (classpath:schema.sql), so the
# original schema.sql MUST be listed explicitly alongside the Phase 3 signals DDL.
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql,classpath:schema-signals.sql

# MQTT broker (overridden by MQTT_BROKER_URL env in docker-compose)
mqtt.broker.url=${MQTT_BROKER_URL:tcp://localhost:1883}
mqtt.client.id=backend-ingest
mqtt.topic=sensors/+

# Ingestion mode toggle: batch (default) or naive (before baseline for 02-02 kill-9 demo).
# Set INGEST_MODE=naive in the environment to switch to the single-INSERT path.
ingest.mode=${INGEST_MODE:batch}

# Frozen baseline asset path (relative to backend/ working directory).
signal.baseline.path=../data/nasa/baseline.frozen.json

# SPC rolling-window size (03-02). 10 balances WE-rule responsiveness against a
# stable rolling Cpk: large enough for a sample stddev (ddof=1) yet small enough
# to react to a regime shift within ~one window. Per (device, metric) instance.
signal.spc.window=10

# FastAPI ML scoring service (03-03, RESEARCH Pattern 3 / D-12). Called OFF the
# ingest hot path by the signal consumer worker. SHORT timeouts bound the
# worker's exposure; on any failure the client returns empty and ML is skipped
# (graceful) — threshold/SPC/ingestion are unaffected (Pitfall 4).
ml.service.url=${ML_SERVICE_URL:http://localhost:8000}
ml.service.connect-timeout-ms=500
ml.service.read-timeout-ms=500

# Auth (04-03, D-08/D-10). Single hardcoded admin + stateless HS256 JWT. All four
# values are env-overridable; real deployments MUST inject JWT_SECRET / ADMIN_PASSWORD.
# The committed jwt secret is a CLEARLY-LABELLED DEV-ONLY placeholder (base64, >=32B
# so HS256 accepts it) — it is NOT a real secret and must be replaced in prod.
auth.admin.username=${ADMIN_USERNAME:admin}
auth.admin.password=${ADMIN_PASSWORD:changeme}
auth.jwt.secret=${JWT_SECRET:ZGV2LW9ubHktand0LXNlY3JldC1DSEFOR0UtSU4tUFJPRC0wMDAwMDAwMDAwMDA=}
auth.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ML anomaly-score alarm threshold (03-03). DELIBERATELY not IsolationForest's
# contamination-based is_anomaly: contamination flags ~5% of healthy readings by
# construction -> a false ML alarm inside the healthy window -> fake huge
# lead-time. 0.21 sits just above the healthy-window score max (~0.2112) so there
# are zero false healthy ML alarms out of the box. The continuous anomaly_score is
# persisted every reading regardless; this only gates the alarm. The real frozen
# ML-threshold rule is a 03-04 concern.
signal.ml.score-threshold=0.21
